idea:
  title: How similar are MLP hidden states to each other?
  domain: machine_learning
  hypothesis: 'The hidden spaces of MLPs at different layers are not totally different
    due to limited individual transformation capacity, but there are measurable differences
    between them that can be compared.

    '
